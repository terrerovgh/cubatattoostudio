title: Cubatattoo Studio Docs
url: https://docs.cubatattoostudio.com
baseurl: ""
theme: minima
logo: assets/images/logo.png
description: >-
  Professional documentation for Cubatattoo Studio, featuring architecture, workflows, and advanced UI/UX guides.
