title: Cubatattoo Studio Docs
url: https://docs.cubatattoostudio.com
baseurl: ""
theme: minimal-mistakes-jekyll
logo: assets/images/logo.png
description: >-
  Professional documentation for Cubatattoo Studio, featuring architecture, workflows, and advanced UI/UX guides.
highlight:
  theme: "monokai"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-archives
  - jekyll-toc

# Minimal Mistakes settings
minimal_mistakes_skin: "dark"
search: true
repository: "cubatattoostudio/docs"
nav:
  - title: "Inicio"
    url: index.md
  - title: "Guía Rápida"
    url: 0-project_rules.md
  - title: "Blueprint"
    url: 1-introduccion_vision_general.md
  - title: "Mapeo de Componentes"
    url: 2-feature_implemetation_component_mapping.md
  - title: "Gobernanza"
    url: info.md
colors:
  background: "#111111"
  accent: "#B91C1C"
  text: "#FFFFFF"
  secondary: "#A1A1AA"
