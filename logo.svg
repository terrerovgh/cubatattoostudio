<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; }
      .main-text { font-size: 32px; fill: #ffffff; }
      .sub-text { font-size: 12px; fill: #ffffff; letter-spacing: 2px; }
      .border { fill: none; stroke: #ffffff; stroke-width: 3; }
      .decorative { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="120" fill="#000000" rx="8"/>
  
  <!-- Decorative border -->
  <path class="border" d="M15 15 L285 15 Q290 15 290 20 L290 100 Q290 105 285 105 L15 105 Q10 105 10 100 L10 20 Q10 15 15 15 Z"/>
  
  <!-- Decorative corners -->
  <path class="decorative" d="M20 20 L30 15 L35 25 L25 30 Z"/>
  <path class="decorative" d="M280 20 L270 15 L265 25 L275 30 Z"/>
  <path class="decorative" d="M20 100 L30 105 L35 95 L25 90 Z"/>
  <path class="decorative" d="M280 100 L270 105 L265 95 L275 90 Z"/>
  
  <!-- Main text: CUBA -->
  <text x="150" y="50" text-anchor="middle" class="logo-text main-text">CUBA</text>
  
  <!-- Subtitle: TATTOO STUDIO -->
  <text x="150" y="75" text-anchor="middle" class="logo-text sub-text">• TATTOO STUDIO •</text>
  
  <!-- Location -->
  <text x="150" y="95" text-anchor="middle" class="logo-text" style="font-size: 10px; fill: #cccccc;">ALBUQUERQUE, NM</text>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="75" r="2" class="decorative"/>
  <circle cx="240" cy="75" r="2" class="decorative"/>
  
  <!-- Small decorative lines -->
  <line x1="70" y1="75" x2="85" y2="75" class="border" stroke-width="1"/>
  <line x1="215" y1="75" x2="230" y2="75" class="border" stroke-width="1"/>
</svg>