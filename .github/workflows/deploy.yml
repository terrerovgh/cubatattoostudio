name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Pre-flight checks ─────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required secrets
        run: |
          MISSING=0
          for secret in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID STRIPE_SECRET_KEY ADMIN_PASSWORD; do
            if [ -z "${{ secrets[secret] }}" ]; then
              echo "❌ $secret is not set"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then exit 1; fi
          echo "✅ All required secrets are set"

  # ── Build & Test ──────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run unit tests
        run: npm run test:run

      - name: Prepare Instagram data
        run: |
          mkdir -p src/data
          if [ ! -f src/data/instagram.ts ]; then
            echo "export const instagramPosts: any[] = [];" > src/data/instagram.ts
          fi

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ── Database Migration ────────────────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run D1 schema migration
        run: |
          npx wrangler d1 execute cubatattoostudio-db \
            --remote \
            --file=src/lib/db/schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [build-test, migrate]
    environment:
      name: production
      url: https://cubatattoostudio.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke Test
        run: |
          # Wait for propagation
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cubatattoostudio.com)
            if [ "$STATUS" == "200" ]; then
              echo "✅ Smoke test passed — HTTP $STATUS"
              exit 0
            fi
            echo "⌛ Waiting for propagation... ($STATUS)"
            sleep 10
          done
          echo "❌ Smoke test failed — HTTP $STATUS"
          exit 1
        continue-on-error: true
