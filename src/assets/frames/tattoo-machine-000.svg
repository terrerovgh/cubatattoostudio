<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8D8D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0A0A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#707070;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C3317;stop-opacity:1" />
    </linearGradient>
    <filter id="machineShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Grupo principal de la máquina - Estado inicial -->
  <g id="tattooMachine" filter="url(#machineShadow)">
    <!-- Frame principal -->
    <rect id="frame" x="60" y="100" width="80" height="200" rx="5" fill="url(#metalGradient)" stroke="#333" stroke-width="1"/>
    
    <!-- Bobinas -->
    <g id="coils">
      <rect id="coil1" x="70" y="110" width="60" height="40" rx="3" fill="url(#coilGradient)" stroke="#333" stroke-width="1"/>
      <rect id="coil2" x="70" y="160" width="60" height="40" rx="3" fill="url(#coilGradient)" stroke="#333" stroke-width="1"/>
      
      <!-- Cables de las bobinas -->
      <path id="coilWire1" d="M75 130 C50 120, 40 90, 60 80" stroke="#222" stroke-width="2" fill="none"/>
      <path id="coilWire2" d="M75 180 C50 170, 40 140, 60 130" stroke="#222" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Barra de armadura -->
    <rect id="armatureBar" x="85" y="110" width="30" height="90" fill="#555" stroke="#333" stroke-width="1"/>
    
    <!-- Resorte - Estado relajado -->
    <path id="spring" d="M100 200 Q110 210, 100 220 Q90 230, 100 240 Q110 250, 100 260" stroke="#888" stroke-width="3" fill="none"/>
    
    <!-- Tubo de aguja -->
    <g id="needleTube">
      <rect id="tube" x="95" y="260" width="10" height="100" fill="url(#metalGradient)" stroke="#333" stroke-width="1"/>
      
      <!-- Aguja - Posición inicial -->
      <line id="needle" x1="100" y1="260" x2="100" y2="370" stroke="#DDD" stroke-width="1"/>
      
      <!-- Punta de la aguja -->
      <circle id="needlePoint" cx="100" cy="370" r="1" fill="#DDD"/>
    </g>
    
    <!-- Grip -->
    <path id="grip" d="M90 320 L110 320 L115 360 L85 360 Z" fill="#333" stroke="#222" stroke-width="1"/>
    
    <!-- Detalles del grip -->
    <line x1="90" y1="330" x2="110" y2="330" stroke="#444" stroke-width="1"/>
    <line x1="89" y1="340" x2="111" y2="340" stroke="#444" stroke-width="1"/>
    <line x1="88" y1="350" x2="112" y2="350" stroke="#444" stroke-width="1"/>
    
    <!-- Tornillos y detalles -->
    <circle cx="75" cy="120" r="3" fill="#333"/>
    <circle cx="125" cy="120" r="3" fill="#333"/>
    <circle cx="75" cy="170" r="3" fill="#333"/>
    <circle cx="125" cy="170" r="3" fill="#333"/>
    <circle cx="100" cy="220" r="4" fill="#333"/>
  </g>
  
  <!-- Elementos decorativos cubanos -->
  <g id="cubanElements" opacity="0.2">
    <path d="M20 50 L40 30 L60 50 L40 70 Z" fill="#D4AF37" transform="rotate(15)"/>
    <path d="M150 40 L170 20 L190 40 L170 60 Z" fill="#D4AF37" transform="rotate(-15)"/>
  </g>
</svg>