<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D0A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1B894;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo (piel) -->
  <rect width="300" height="300" fill="url(#skinGradient)" rx="10"/>
  
  <!-- Diseño de tatuaje blackwork - Mandala geométrica -->
  <g transform="translate(150, 150)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#000000" stroke-width="2"/>
    
    <!-- Patrón geométrico -->
    <g>
      <!-- Triángulos exteriores -->
      <g>
        <path d="M0 -120 L30 -90 L-30 -90 Z" fill="#000000"/>
        <path d="M0 120 L30 90 L-30 90 Z" fill="#000000"/>
        <path d="M-120 0 L-90 30 L-90 -30 Z" fill="#000000"/>
        <path d="M120 0 L90 30 L90 -30 Z" fill="#000000"/>
        
        <path d="M-85 -85 L-60 -60 L-85 -35 Z" fill="#000000"/>
        <path d="M85 -85 L60 -60 L85 -35 Z" fill="#000000"/>
        <path d="M-85 85 L-60 60 L-85 35 Z" fill="#000000"/>
        <path d="M85 85 L60 60 L85 35 Z" fill="#000000"/>
      </g>
      
      <!-- Círculo medio -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="#000000" stroke-width="3"/>
      
      <!-- Patrón interior -->
      <g>
        <path d="M0 -80 L20 -60 L0 -40 L-20 -60 Z" fill="#000000"/>
        <path d="M0 80 L20 60 L0 40 L-20 60 Z" fill="#000000"/>
        <path d="M-80 0 L-60 20 L-40 0 L-60 -20 Z" fill="#000000"/>
        <path d="M80 0 L60 20 L40 0 L60 -20 Z" fill="#000000"/>
        
        <path d="M-56 -56 L-42 -42 L-56 -28 L-70 -42 Z" fill="#000000"/>
        <path d="M56 -56 L42 -42 L56 -28 L70 -42 Z" fill="#000000"/>
        <path d="M-56 56 L-42 42 L-56 28 L-70 42 Z" fill="#000000"/>
        <path d="M56 56 L42 42 L56 28 L70 42 Z" fill="#000000"/>
      </g>
      
      <!-- Círculo interior -->
      <circle cx="0" cy="0" r="30" fill="none" stroke="#000000" stroke-width="2"/>
      
      <!-- Centro -->
      <circle cx="0" cy="0" r="15" fill="#000000"/>
      
      <!-- Líneas radiales -->
      <g stroke="#000000" stroke-width="1">
        <line x1="0" y1="-120" x2="0" y2="-30" />
        <line x1="0" y1="30" x2="0" y2="120" />
        <line x1="-120" y1="0" x2="-30" y2="0" />
        <line x1="30" y1="0" x2="120" y2="0" />
        
        <line x1="-85" y1="-85" x2="-21" y2="-21" />
        <line x1="85" y1="-85" x2="21" y2="-21" />
        <line x1="-85" y1="85" x2="-21" y2="21" />
        <line x1="85" y1="85" x2="21" y2="21" />
      </g>
    </g>
  </g>
  
  <!-- Etiqueta de estilo -->
  <rect x="10" y="10" width="100" height="30" fill="rgba(0,0,0,0.7)" rx="5"/>
  <text x="60" y="30" font-family="Montserrat, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">BLACKWORK</text>
</svg>