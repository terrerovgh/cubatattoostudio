<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="300" height="400" fill="url(#bgGradient)"/>
  
  <!-- Elementos decorativos de fondo -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.2"/>
  <circle cx="250" cy="350" r="30" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.2"/>
  
  <!-- Silueta del artista -->
  <g transform="translate(75, 50)">
    <!-- Cabeza -->
    <circle cx="75" cy="60" r="50" fill="#333"/>
    
    <!-- Cuerpo -->
    <path d="M75 110 L75 250 M30 150 L120 150" stroke="#333" stroke-width="30" stroke-linecap="round"/>
    
    <!-- Brazos -->
    <path d="M30 150 L10 200 M120 150 L140 200" stroke="#333" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Piernas -->
    <path d="M60 250 L50 350 M90 250 L100 350" stroke="#333" stroke-width="25" stroke-linecap="round"/>
    
    <!-- Máquina de tatuar en la mano -->
    <path d="M140 200 L160 220" stroke="#555" stroke-width="8" stroke-linecap="round"/>
    <rect x="155" y="215" width="10" height="20" fill="#555" rx="2"/>
  </g>
  
  <!-- Texto "Artista" -->
  <text x="150" y="30" font-family="Montserrat, sans-serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">ARTISTA</text>
  
  <!-- Texto "Realismo & Blackwork" -->
  <text x="150" y="380" font-family="Montserrat, sans-serif" font-size="14" 
        text-anchor="middle" fill="url(#accentGradient)">REALISMO & BLACKWORK</text>
</svg>