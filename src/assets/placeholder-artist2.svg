<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="300" height="400" fill="url(#bgGradient2)"/>
  
  <!-- Elementos decorativos de fondo -->
  <polygon points="20,20 40,10 60,20 40,30" fill="none" stroke="url(#accentGradient2)" stroke-width="1" opacity="0.2"/>
  <polygon points="240,380 260,370 280,380 260,390" fill="none" stroke="url(#accentGradient2)" stroke-width="1" opacity="0.2"/>
  
  <!-- Silueta del artista (estilo femenino) -->
  <g transform="translate(75, 50)">
    <!-- Cabeza -->
    <circle cx="75" cy="60" r="45" fill="#333"/>
    
    <!-- Cabello largo -->
    <path d="M40 40 C30 70, 30 100, 40 120 M110 40 C120 70, 120 100, 110 120" stroke="#333" stroke-width="15" stroke-linecap="round"/>
    
    <!-- Cuerpo -->
    <path d="M75 105 L75 230" stroke="#333" stroke-width="25" stroke-linecap="round"/>
    
    <!-- Brazos -->
    <path d="M75 130 L30 180 M75 130 L120 180" stroke="#333" stroke-width="15" stroke-linecap="round"/>
    
    <!-- Piernas -->
    <path d="M65 230 L55 350 M85 230 L95 350" stroke="#333" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Máquina de tatuar en la mano -->
    <path d="M30 180 L10 200" stroke="#555" stroke-width="8" stroke-linecap="round"/>
    <rect x="5" y="195" width="10" height="20" fill="#555" rx="2"/>
  </g>
  
  <!-- Texto "Artista" -->
  <text x="150" y="30" font-family="Montserrat, sans-serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">ARTISTA</text>
  
  <!-- Texto "Neo-tradicional & Color" -->
  <text x="150" y="380" font-family="Montserrat, sans-serif" font-size="14" 
        text-anchor="middle" fill="url(#accentGradient2)">NEO-TRADICIONAL & COLOR</text>
</svg>