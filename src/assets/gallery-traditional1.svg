<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="skinGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D0A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1B894;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo (piel) -->
  <rect width="300" height="300" fill="url(#skinGradient2)" rx="10"/>
  
  <!-- Diseño de tatuaje tradicional - Rosa con daga -->
  <g transform="translate(150, 150)">
    <!-- Daga -->
    <g>
      <!-- Hoja -->
      <path d="M0 -120 L20 -60 L0 40 L-20 -60 Z" fill="#D6D6D6" stroke="#000000" stroke-width="3"/>
      
      <!-- Línea central de la hoja -->
      <line x1="0" y1="-120" x2="0" y2="40" stroke="#000000" stroke-width="1"/>
      
      <!-- Guarda -->
      <rect x="-40" y="40" width="80" height="15" fill="#8B4513" stroke="#000000" stroke-width="3" rx="2"/>
      
      <!-- Empuñadura -->
      <rect x="-10" y="55" width="20" height="50" fill="#A0522D" stroke="#000000" stroke-width="3"/>
      
      <!-- Pomo -->
      <circle cx="0" cy="115" r="10" fill="#8B4513" stroke="#000000" stroke-width="3"/>
    </g>
    
    <!-- Rosa -->
    <g transform="translate(-60, -60)">
      <!-- Pétalos exteriores -->
      <g fill="#D81B60" stroke="#000000" stroke-width="2">
        <path d="M60 60 C80 40, 90 30, 90 10 C70 20, 60 30, 60 60 Z" />
        <path d="M60 60 C40 40, 30 30, 30 10 C50 20, 60 30, 60 60 Z" />
        <path d="M60 60 C80 80, 90 90, 90 110 C70 100, 60 90, 60 60 Z" />
        <path d="M60 60 C40 80, 30 90, 30 110 C50 100, 60 90, 60 60 Z" />
        
        <path d="M60 60 C90 50, 100 40, 120 40 C100 60, 80 60, 60 60 Z" />
        <path d="M60 60 C90 70, 100 80, 120 80 C100 60, 80 60, 60 60 Z" />
        <path d="M60 60 C30 50, 20 40, 0 40 C20 60, 40 60, 60 60 Z" />
        <path d="M60 60 C30 70, 20 80, 0 80 C20 60, 40 60, 60 60 Z" />
      </g>
      
      <!-- Centro de la rosa -->
      <circle cx="60" cy="60" r="15" fill="#AD1457" stroke="#000000" stroke-width="2"/>
    </g>
    
    <!-- Hojas -->
    <g fill="#2E7D32" stroke="#000000" stroke-width="2">
      <path d="M-30 -20 C-50 -30, -70 -20, -80 0 C-60 -10, -40 -10, -30 -20 Z" />
      <path d="M-40 0 C-60 10, -80 30, -70 50 C-60 30, -50 10, -40 0 Z" />
    </g>
  </g>
  
  <!-- Etiqueta de estilo -->
  <rect x="10" y="10" width="100" height="30" fill="rgba(0,0,0,0.7)" rx="5"/>
  <text x="60" y="30" font-family="Montserrat, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">TRADICIONAL</text>
</svg>