<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4037;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#263238;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#37474F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo/Pared -->
  <rect width="600" height="400" fill="url(#wallGradient)"/>
  
  <!-- Piso -->
  <rect x="0" y="300" width="600" height="100" fill="url(#floorGradient)"/>
  
  <!-- Línea divisoria entre pared y piso -->
  <line x1="0" y1="300" x2="600" y2="300" stroke="#212121" stroke-width="2"/>
  
  <!-- Estaciones de tatuaje -->
  <!-- Estación 1 -->
  <g transform="translate(100, 250)">
    <!-- Silla de tatuaje -->
    <rect x="0" y="0" width="80" height="20" fill="#000000" rx="5"/>
    <rect x="30" y="20" width="20" height="50" fill="#000000"/>
    <rect x="20" y="70" width="40" height="10" fill="#000000" rx="2"/>
    
    <!-- Mesa de trabajo -->
    <rect x="100" y="30" width="80" height="40" fill="#424242" rx="2"/>
    <rect x="110" y="70" width="10" height="30" fill="#424242"/>
    <rect x="160" y="70" width="10" height="30" fill="#424242"/>
  </g>
  
  <!-- Estación 2 -->
  <g transform="translate(350, 250)">
    <!-- Silla de tatuaje -->
    <rect x="0" y="0" width="80" height="20" fill="#000000" rx="5"/>
    <rect x="30" y="20" width="20" height="50" fill="#000000"/>
    <rect x="20" y="70" width="40" height="10" fill="#000000" rx="2"/>
    
    <!-- Mesa de trabajo -->
    <rect x="100" y="30" width="80" height="40" fill="#424242" rx="2"/>
    <rect x="110" y="70" width="10" height="30" fill="#424242"/>
    <rect x="160" y="70" width="10" height="30" fill="#424242"/>
  </g>
  
  <!-- Elementos decorativos en la pared -->
  <!-- Logo del estudio -->
  <g transform="translate(250, 50) scale(0.5)">
    <rect x="0" y="0" width="200" height="80" fill="#1a1a1a" rx="5"/>
    <text x="100" y="30" font-family="Permanent Marker, cursive" font-size="24" font-weight="bold" 
          text-anchor="middle" fill="url(#accentGradient3)">CUBA</text>
    <line x1="40" y1="40" x2="160" y2="40" stroke="url(#accentGradient3)" stroke-width="2"/>
    <text x="100" y="60" font-family="Montserrat, sans-serif" font-size="16" 
          text-anchor="middle" fill="#ffffff">TATTOO STUDIO</text>
  </g>
  
  <!-- Cuadros/Arte en la pared -->
  <rect x="50" y="50" width="80" height="120" fill="#000000" stroke="url(#accentGradient3)" stroke-width="2"/>
  <rect x="470" y="50" width="80" height="120" fill="#000000" stroke="url(#accentGradient3)" stroke-width="2"/>
  
  <!-- Flash de tatuajes en la pared -->
  <g transform="translate(150, 100)">
    <rect width="60" height="80" fill="#EEEEEE" stroke="#000000" stroke-width="1"/>
    <line x1="10" y1="20" x2="50" y2="20" stroke="#333333" stroke-width="2"/>
    <line x1="10" y1="40" x2="50" y2="40" stroke="#333333" stroke-width="2"/>
    <line x1="10" y1="60" x2="50" y2="60" stroke="#333333" stroke-width="2"/>
  </g>
  
  <g transform="translate(390, 100)">
    <rect width="60" height="80" fill="#EEEEEE" stroke="#000000" stroke-width="1"/>
    <circle cx="30" cy="30" r="15" fill="none" stroke="#333333" stroke-width="2"/>
    <path d="M20 50 L40 50 L30 70 Z" fill="none" stroke="#333333" stroke-width="2"/>
  </g>
  
  <!-- Mostrador de recepción -->
  <rect x="0" y="180" width="120" height="40" fill="#5D4037" rx="2"/>
  <rect x="0" y="220" width="120" height="80" fill="#4E342E"/>
  
  <!-- Elementos decorativos cubanos -->
  <g opacity="0.2">
    <path d="M550 20 L580 20 L580 50 L550 50 Z" fill="none" stroke="url(#accentGradient3)" stroke-width="1"/>
    <path d="M20 350 L50 350 L50 380 L20 380 Z" fill="none" stroke="url(#accentGradient3)" stroke-width="1"/>
  </g>
  
  <!-- Texto "Interior del Estudio" -->
  <text x="300" y="380" font-family="Montserrat, sans-serif" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">INTERIOR DEL ESTUDIO</text>
</svg>