<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fondo decorativo cubano -->
  <rect x="0" y="0" width="300" height="100" fill="#1a1a1a" rx="5"/>
  
  <!-- Elementos decorativos -->
  <circle cx="20" cy="20" r="3" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="280" cy="80" r="3" fill="url(#goldGradient)" opacity="0.7"/>
  
  <!-- Texto principal -->
  <text x="150" y="35" font-family="Permanent Marker, cursive" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="url(#goldGradient)" filter="url(#shadow)">CUBA</text>
  
  <!-- Línea decorativa -->
  <line x1="50" y1="45" x2="250" y2="45" stroke="url(#goldGradient)" stroke-width="2" opacity="0.8"/>
  
  <!-- Texto secundario -->
  <text x="150" y="65" font-family="Montserrat, sans-serif" font-size="16" font-weight="300" 
        text-anchor="middle" fill="#ffffff" letter-spacing="2px">TATTOO STUDIO</text>
  
  <!-- Ubicación -->
  <text x="150" y="85" font-family="Montserrat, sans-serif" font-size="10" font-weight="300" 
        text-anchor="middle" fill="#cccccc" opacity="0.8">ALBUQUERQUE, NM</text>
  
  <!-- Elementos decorativos adicionales -->
  <polygon points="30,50 35,45 40,50 35,55" fill="url(#goldGradient)" opacity="0.6"/>
  <polygon points="260,50 265,45 270,50 265,55" fill="url(#goldGradient)" opacity="0.6"/>
</svg>