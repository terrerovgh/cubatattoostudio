<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="skinGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D0A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1B894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunsetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F44336;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo (piel) -->
  <rect width="300" height="300" fill="url(#skinGradient3)" rx="10"/>
  
  <!-- Diseño de tatuaje a color - Paisaje cubano -->
  <g transform="translate(30, 30)">
    <!-- Cielo -->
    <rect x="0" y="0" width="240" height="120" fill="url(#skyGradient)" rx="5" stroke="#000000" stroke-width="2"/>
    
    <!-- Sol/Atardecer -->
    <circle cx="120" cy="30" r="20" fill="url(#sunsetGradient)" stroke="#000000" stroke-width="1"/>
    
    <!-- Rayos de sol -->
    <g stroke="#FF9800" stroke-width="1">
      <line x1="120" y1="0" x2="120" y2="5" />
      <line x1="120" y1="55" x2="120" y2="60" />
      <line x1="90" y1="30" x2="95" y2="30" />
      <line x1="145" y1="30" x2="150" y2="30" />
      <line x1="99" y1="9" x2="103" y2="13" />
      <line x1="137" y1="47" x2="141" y2="51" />
      <line x1="99" y1="51" x2="103" y2="47" />
      <line x1="137" y1="13" x2="141" y2="9" />
    </g>
    
    <!-- Mar -->
    <rect x="0" y="120" width="240" height="80" fill="#039BE5" stroke="#000000" stroke-width="2"/>
    
    <!-- Olas -->
    <g fill="none" stroke="#81D4FA" stroke-width="1">
      <path d="M10 130 Q20 125, 30 130 Q40 135, 50 130 Q60 125, 70 130" />
      <path d="M50 140 Q60 135, 70 140 Q80 145, 90 140 Q100 135, 110 140" />
      <path d="M90 150 Q100 145, 110 150 Q120 155, 130 150 Q140 145, 150 150" />
      <path d="M130 160 Q140 155, 150 160 Q160 165, 170 160 Q180 155, 190 160" />
      <path d="M170 170 Q180 165, 190 170 Q200 175, 210 170 Q220 165, 230 170" />
    </g>
    
    <!-- Arena/Playa -->
    <rect x="0" y="200" width="240" height="40" fill="#FFF176" stroke="#000000" stroke-width="2"/>
    
    <!-- Palmeras -->
    <g transform="translate(40, 180) scale(0.8)">
      <!-- Tronco -->
      <path d="M0 0 C5 -20, 10 -40, 5 -60" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Hojas -->
      <g fill="#2E7D32" stroke="#000000" stroke-width="1">
        <path d="M5 -60 C15 -65, 25 -60, 35 -50 C25 -55, 15 -60, 5 -60 Z" />
        <path d="M5 -60 C0 -70, -5 -75, -15 -80 C-5 -75, 0 -65, 5 -60 Z" />
        <path d="M5 -60 C10 -70, 15 -80, 25 -85 C15 -80, 10 -70, 5 -60 Z" />
      </g>
    </g>
    
    <g transform="translate(200, 190) scale(0.7)">
      <!-- Tronco -->
      <path d="M0 0 C-5 -20, -10 -40, -5 -60" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Hojas -->
      <g fill="#2E7D32" stroke="#000000" stroke-width="1">
        <path d="M-5 -60 C-15 -65, -25 -60, -35 -50 C-25 -55, -15 -60, -5 -60 Z" />
        <path d="M-5 -60 C0 -70, 5 -75, 15 -80 C5 -75, 0 -65, -5 -60 Z" />
        <path d="M-5 -60 C-10 -70, -15 -80, -25 -85 C-15 -80, -10 -70, -5 -60 Z" />
      </g>
    </g>
    
    <!-- Pequeña cabaña -->
    <g transform="translate(120, 190)">
      <!-- Estructura -->
      <rect x="-15" y="-20" width="30" height="20" fill="#8D6E63" stroke="#000000" stroke-width="1"/>
      
      <!-- Techo -->
      <polygon points="-20,-20 0,-35 20,-20" fill="#FF5722" stroke="#000000" stroke-width="1"/>
      
      <!-- Puerta -->
      <rect x="-5" y="-15" width="10" height="15" fill="#5D4037" stroke="#000000" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Etiqueta de estilo -->
  <rect x="10" y="10" width="70" height="30" fill="rgba(0,0,0,0.7)" rx="5"/>
  <text x="45" y="30" font-family="Montserrat, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">COLOR</text>
</svg>