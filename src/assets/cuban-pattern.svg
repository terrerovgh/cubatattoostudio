<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="cubanPattern" patternUnits="userSpaceOnUse" width="200" height="200">
      <rect width="200" height="200" fill="#1a1a1a"/>
      
      <!-- Elementos de la bandera cubana estilizados -->
      <rect x="0" y="0" width="200" height="40" fill="#002590" opacity="0.15"/>
      <rect x="0" y="40" width="200" height="40" fill="#ffffff" opacity="0.05"/>
      <rect x="0" y="80" width="200" height="40" fill="#002590" opacity="0.15"/>
      <rect x="0" y="120" width="200" height="40" fill="#ffffff" opacity="0.05"/>
      <rect x="0" y="160" width="200" height="40" fill="#002590" opacity="0.15"/>
      
      <!-- Triángulo rojo estilizado -->
      <polygon points="0,0 80,100 0,200" fill="#CC0000" opacity="0.1"/>
      
      <!-- Estrella estilizada -->
      <polygon points="30,100 38,120 60,120 42,135 50,155 30,140 10,155 18,135 0,120 22,120" 
               fill="#ffffff" opacity="0.1" transform="scale(0.8)"/>
      
      <!-- Elementos decorativos adicionales -->
      <circle cx="150" cy="50" r="15" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.2"/>
      <circle cx="150" cy="150" r="15" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.2"/>
      <circle cx="50" cy="150" r="15" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.2"/>
      
      <!-- Motivos de palmas -->
      <path d="M150 50 C160 40, 170 45, 175 35" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M150 50 C140 40, 130 45, 125 35" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M150 50 C150 40, 150 30, 150 20" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      
      <path d="M150 150 C160 140, 170 145, 175 135" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M150 150 C140 140, 130 145, 125 135" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M150 150 C150 140, 150 130, 150 120" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      
      <path d="M50 150 C60 140, 70 145, 75 135" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M50 150 C40 140, 30 145, 25 135" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      <path d="M50 150 C50 140, 50 130, 50 120" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.15"/>
      
      <!-- Líneas decorativas -->
      <line x1="0" y1="0" x2="200" y2="200" stroke="#D4AF37" stroke-width="0.5" opacity="0.1"/>
      <line x1="200" y1="0" x2="0" y2="200" stroke="#D4AF37" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#cubanPattern)"/>
</svg>