<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuba Tattoo Studio - Albuquerque</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Metal+Mania&family=Butcherman&family=Eater&family=Chela+One&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Content - Logo and Tattoo Machine Focus -->
    <main class="main-content">
        <!-- Logo Section -->
        <section class="logo-section">
            <div class="logo-container">
                <img src="img/logo.jpg" alt="Cuba Tattoo Studio" class="main-logo">
                <h1 class="studio-title">Cuba Tattoo Studio</h1>
                <p class="studio-location">Albuquerque, New Mexico</p>
            </div>
        </section>

        <!-- Tattoo Machine Section -->
        <section class="machine-section">
            <div class="tattoo-machine-container">
                <img src="img/tattoo machine.png" alt="Tattoo Machine" class="tattoo-machine">
                <div class="needle-container">
                    <div class="needle"></div>
                    <div class="ink-drops"></div>
                </div>
                <div class="vibration-effects">
                    <div class="spark spark-1"></div>
                    <div class="spark spark-2"></div>
                    <div class="spark spark-3"></div>
                </div>
            </div>
            <div class="machine-text">
                <h2 class="machine-title">Arte en Movimiento</h2>
                <p class="machine-subtitle">Cada vibración cuenta una historia</p>
            </div>
        </section>

        <!-- Contact Info -->
        <section class="contact-minimal">
            <div class="contact-info">
                <p class="contact-item">📞 (505) 123-CUBA</p>
                <p class="contact-item">📍 123 Central Ave, Albuquerque</p>
                <p class="contact-item">✉️ info@cubatattoostudio.com</p>
            </div>
        </section>
    </main>



    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
